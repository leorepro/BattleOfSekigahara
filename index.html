<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3D 關原之戰 — 電視級歷史節目</title>
<style>
  :root{
    --east:#1c46d2;   /* 東軍 德川 藍（加深 + 高彩度） */
    --west:#d11418;   /* 西軍 石田 紅（加深 + 高彩度） */
    --ink:#e9e4d4;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a0d12; }
  body{ font-family:"Noto Serif TC","Songti TC",serif; color:var(--ink); }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; }

  /* CSS2D 標籤層 */
  #labels{ position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .lbl{ font-size:13px; white-space:nowrap; text-shadow:0 1px 3px #000,0 0 6px #000;
        transform:translate(-50%,-50%); }
  .lbl-geo{ color:#e4ead8; letter-spacing:1px; }
  .lbl-geo .ja{ font-size:9px; opacity:.55; }
  .lbl-geo .ic{ margin-right:3px; opacity:.85; }
  .geo-major{ font-size:14px; font-weight:600; color:#f0ead2; }
  .geo-major .ic{ color:#e8c87a; }
  .geo-minor{ font-size:11px; opacity:.7; }
  .lbl-unit{ font-weight:700; text-align:center; line-height:1.3; }
  .lbl-unit .ja{ font-size:10px; opacity:.75; font-weight:400; }
  .lbl-unit .troops{ font-size:11px; font-weight:400; opacity:.9; }
  .lbl-unit.focus{ font-size:15px; text-shadow:0 1px 4px #000,0 0 8px rgba(255,220,140,.5); }
  .lbl-unit.dim{ font-size:10px; }
  .lbl-unit.dim .troops{ display:none; }
  /* 各部隊血條 */
  .lbl-unit .hp{ width:60px; height:4px; margin:2px auto 1px; background:rgba(0,0,0,.5);
                 border-radius:2px; overflow:hidden; box-shadow:0 0 2px #000; }
  .lbl-unit .hp i{ display:block; height:100%; width:100%; border-radius:2px; transition:width .3s linear; }
  .side-east .hp i{ background:#2a54d6; } .side-west .hp i{ background:#d12a2a; }
  .lbl-unit .hp i.low{ background:#d8a838; }
  .lbl-unit.dim .hp{ display:none; }
  /* 倒戈後改投東軍：名字與血條轉藍 */
  .lbl-unit.defected{ color:#9cc0ff; }
  .lbl-unit.defected .hp i{ background:#2a54d6; }
  .side-east{ color:#9cc0ff; } .side-west{ color:#ff9c9c; }

  /* 交戰標記 A ⚔ B */
  .clash{ transform:translate(-50%,-50%); white-space:nowrap; pointer-events:none;
          font-size:13px; font-weight:700; padding:2px 9px; border-radius:13px;
          background:rgba(10,12,16,.74); border:1px solid rgba(255,210,90,.55);
          text-shadow:0 1px 3px #000; animation:clashPulse 1s ease-in-out infinite; }
  .clash .x{ color:#ffd24a; margin:0 5px; }
  .clash .cn-east{ color:#9cc0ff; } .clash .cn-west{ color:#ff9c9c; }
  @keyframes clashPulse{ 0%,100%{ opacity:.82; } 50%{ opacity:1; } }

  /* 標題卡 */
  #titlecard{ position:fixed; left:0; right:0; bottom:8%; text-align:center;
              pointer-events:none; transition:opacity .6s; }
  #titlecard h1{ font-size:30px; letter-spacing:6px; text-shadow:0 2px 12px #000; }
  #titlecard p{ margin-top:6px; font-size:14px; opacity:.8; letter-spacing:2px; }

  /* HUD：時刻 / 操作提示 — 和風精緻版 */
  #hud{ position:fixed; top:14px; left:16px; font-size:12px; line-height:1.65; letter-spacing:1px;
        background:linear-gradient(180deg, rgba(24,20,16,.90), rgba(15,13,11,.86));
        border:1px solid rgba(232,200,122,.26); border-radius:9px; padding:7px 14px 8px;
        color:#ece3cf; box-shadow:0 5px 18px rgba(0,0,0,.45); }
  #hud .clk{ font-size:12.5px; letter-spacing:1.5px; white-space:nowrap; }
  #hud b{ color:#e8c87a; font-weight:700; }
  #hud #phase{ color:#d8ccb0; }
  #hud .hint{ font-size:10px; opacity:.6; letter-spacing:.5px; white-space:nowrap; margin-top:3px; padding-top:3px;
        border-top:1px solid rgba(232,200,122,.14); }

  /* 戰役切換（關原 ⇄ 桶狹間） */
  #campaign-switch{ position:fixed; top:84px; left:16px; z-index:9; display:flex;
        border:1px solid rgba(201,168,106,.42); border-radius:8px; overflow:hidden; font-size:12px;
        letter-spacing:1px; box-shadow:0 2px 10px rgba(0,0,0,.5); }
  #campaign-switch .cs-item{ padding:6px 13px; background:rgba(20,15,10,.85); color:#cdd4de;
        text-decoration:none; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; }
  #campaign-switch .cs-item small{ opacity:.6; font-size:9px; margin-left:4px; }
  #campaign-switch .cs-item + .cs-item{ border-left:1px solid rgba(201,168,106,.42); }
  #campaign-switch .cs-item:hover{ background:rgba(44,52,64,.95); color:#fff; }
  #campaign-switch .cs-item.active{ background:#e8c87a; color:#16181c; font-weight:700; cursor:default; }
  #campaign-switch .cs-item.active:hover{ background:#e8c87a; }

  #loading{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
            background:#0a0d12; z-index:10; transition:opacity .8s; font-size:15px; letter-spacing:3px; }

  /* 關鍵事件提示橫幅 */
  #toast{ position:fixed; top:52px; left:50%; transform:translate(-50%,-8px); z-index:7;
          pointer-events:none; opacity:0; transition:opacity .35s, transform .35s;
          background:linear-gradient(90deg,rgba(20,16,10,.2),rgba(40,30,14,.92),rgba(20,16,10,.2));
          padding:7px 26px; border-radius:5px; font-size:16px; font-weight:700; letter-spacing:2px;
          color:#ffe6a8; text-shadow:0 1px 6px #000,0 0 10px rgba(255,160,0,.5);
          border-top:1px solid rgba(255,200,90,.4); border-bottom:1px solid rgba(255,200,90,.4); }
  #toast.show{ opacity:1; transform:translate(-50%,0); }

  /* 事件卡（旁白） */
  #caption{ position:fixed; left:50%; transform:translateX(-50%); bottom:104px; width:min(820px,86vw);
            text-align:center; pointer-events:none; transition:opacity .5s; z-index:2; }
  /* 旁白文字：黑色描邊（outline）+ 柔光，無底板，亮底圖上仍清楚 */
  #evDate{ font-size:13px; letter-spacing:4px; color:#e8c87a;
           text-shadow:-1px -1px 1px #000,1px -1px 1px #000,-1px 1px 1px #000,1px 1px 1px #000,0 0 6px rgba(0,0,0,.9); }
  #evTitle{ font-size:27px; font-weight:700; letter-spacing:3px; margin-top:4px;
            text-shadow:-1px -1px 1px #000,1px -1px 1px #000,-1px 1px 1px #000,1px 1px 1px #000,0 0 7px #000,0 0 15px rgba(0,0,0,.85); }
  #evTitleEn{ font-size:13px; font-style:italic; opacity:.8; letter-spacing:2px; margin-top:2px;
              text-shadow:-1px -1px 1px #000,1px -1px 1px #000,-1px 1px 1px #000,1px 1px 1px #000,0 0 6px rgba(0,0,0,.9); }
  #evNarr{ display:inline-block; max-width:640px; text-wrap:balance; text-align:center;
           font-size:14px; line-height:1.7; margin-top:11px; letter-spacing:.5px;
           padding:7px 20px; border-radius:9px;
           background:rgba(12,12,15,.60); border:1px solid rgba(255,255,255,.06);
           box-shadow:0 4px 16px rgba(0,0,0,.4);
           text-shadow:0 1px 2px #000,0 0 5px rgba(0,0,0,.85); }
  #evCmd{ margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  #evCmd .chip{ font-size:12px; padding:3px 11px; border-radius:13px; background:rgba(26,20,13,.7);
                border:1px solid rgba(201,168,106,.42); letter-spacing:1px; }
  #evCmd .chip .en{ opacity:.6; font-size:10px; }
  #caption.hot #evTitle{ color:#ffd24a; text-shadow:0 0 18px rgba(255,160,0,.85),0 2px 8px #000; }

  /* 符號圖例（凡例）— 和風精緻版 */
  #legend{ position:fixed; top:14px; right:16px; width:224px;
           background:linear-gradient(180deg, rgba(24,20,16,.93), rgba(15,13,11,.91));
           border:1px solid rgba(232,200,122,.30); border-radius:10px;
           padding:12px 15px 13px; font-size:11.5px; line-height:1.5; letter-spacing:.6px;
           color:#e7dec9; box-shadow:0 6px 22px rgba(0,0,0,.5); }
  #legend .lg-title{ text-align:center; color:#e8c87a; font-size:12px; letter-spacing:9px;
           font-weight:700; text-indent:9px; padding-bottom:9px;
           border-bottom:1px solid rgba(232,200,122,.24); }
  #legend .lg-sec{ color:#cba968; font-size:9.5px; letter-spacing:4px; margin:10px 0 4px; text-indent:1px; }
  #legend .lg-row{ display:flex; align-items:center; gap:8px; margin:4px 0; white-space:nowrap; }
  #legend .sw{ width:14px; height:14px; border-radius:3px; display:inline-block; flex:0 0 auto;
           box-shadow:0 0 0 1px rgba(0,0,0,.45); }
  #legend .ic{ display:inline-block; width:16px; text-align:center; flex:0 0 auto; opacity:.92; }
  #legend .kbadge{ margin:0; flex:0 0 auto; }

  /* 軍隊清單面板（可收合，置於左側） */
  #roster{ position:fixed; left:14px; top:124px; width:236px; max-height:64vh; overflow-y:auto;
           background:rgba(16,12,8,.84); border:1px solid rgba(201,168,106,.34); border-radius:9px;
           padding:9px 11px; font-size:11.5px; letter-spacing:.4px; line-height:1.45;
           display:none; z-index:6; }
  #roster.show{ display:block; }
  #roster .rs-tot{ font-size:12.5px; font-weight:700; margin-bottom:4px; }
  #roster .rs-row{ display:flex; justify-content:space-between; gap:8px; margin:2px 0; }
  #roster .rs-row .s, #roster .rs-tot b{ font-variant-numeric:tabular-nums; }
  #roster .rs-sec{ color:#e8c87a; font-size:10.5px; margin:7px 0 3px; letter-spacing:2px;
                   border-top:1px solid rgba(201,168,106,.34); padding-top:5px; }
  #roster .rs-pair{ display:flex; align-items:center; gap:5px; margin:3px 0; font-size:11px; }
  #roster .rs-pair .vs{ color:#ffd24a; }
  #roster .s{ opacity:.85; }
  #roster .e{ color:#9cc0ff; } #roster .w{ color:#ff9c9c; }
  /* 兵力長條（東軍藍 / 西軍紅，長度對應兵力差距） */
  #roster .rs-nb{ margin:5px 0 0; }
  #roster .rs-bar{ height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; margin:2px 0 1px; }
  #roster .rs-bar i{ display:block; height:100%; border-radius:3px; transition:width .25s linear; }
  #roster .rs-bar i.e{ background:linear-gradient(90deg,#2a54d6,#5b86f5); }
  #roster .rs-bar i.w{ background:linear-gradient(90deg,#d12a2a,#f2615f); }

  /* 兵種徽章 */
  .kbadge{ display:inline-block; min-width:14px; padding:0 3px; margin-right:4px; border-radius:3px;
           font-size:10px; font-weight:700; text-align:center; color:#16181c; }
  .k-cavalry{ background:#e6b84e; } .k-matchlock{ background:#bcc8d4; }
  .k-artillery{ background:#e8884a; } .k-command{ background:#dcd28e; } .k-infantry{ background:#a6c29c; }
  .lbl-unit.dim .kbadge{ display:none; }

  /* 史料面板 */
  #notes{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(.97);
          width:min(720px,90vw); max-height:82vh; overflow-y:auto; background:rgba(22,17,11,.97);
          border:1px solid rgba(201,168,106,.42); border-radius:13px; padding:24px 28px; z-index:8;
          opacity:0; pointer-events:none; transition:opacity .22s, transform .22s;
          box-shadow:0 16px 50px rgba(0,0,0,.6); }
  #notes.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  #notes h2{ font-size:18px; letter-spacing:3px; margin-bottom:14px; color:#f0ead2; }
  #notes h3{ font-size:14px; color:#e8c87a; margin:16px 0 7px; letter-spacing:2px; }
  #notes p{ font-size:13px; line-height:1.8; opacity:.92; }
  #notes ul{ margin:4px 0 4px 4px; list-style:none; }
  #notes li{ font-size:12.5px; line-height:1.7; opacity:.88; padding-left:14px; position:relative; }
  #notes li::before{ content:"·"; position:absolute; left:2px; color:#e8c87a; }
  #notes li.caveat::before{ content:"⚠"; font-size:10px; }
  #notesClose{ position:absolute; top:14px; right:18px; cursor:pointer; opacity:.6; font-size:15px; }

  /* 兵力儀表 */
  #bars{ position:fixed; top:10px; left:50%; transform:translateX(-50%); width:min(640px,82vw);
         text-shadow:0 1px 3px #000; }
  #bars .bal-head{ display:flex; justify-content:space-between; align-items:center; font-size:13.5px;
         font-weight:700; letter-spacing:1px; margin-bottom:4px; }
  #bars .bal-head b{ font-variant-numeric:tabular-nums; }
  #bars .bh-mid{ color:#e8c87a; font-size:12px; letter-spacing:2px; }
  #bars .bal-track{ display:flex; height:14px; border-radius:4px; overflow:hidden;
         background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.18);
         box-shadow:0 1px 4px rgba(0,0,0,.5); }
  #barEast{ background:linear-gradient(90deg,#13309e,#3f72e0); transition:width .4s; }
  #barWest{ background:linear-gradient(270deg,#8f0c0c,#e0382c); transition:width .4s; }

  /* 控制列 */
  #controls{ position:fixed; left:0; right:0; bottom:0; height:84px; display:flex; align-items:center;
             gap:14px; padding:0 20px; background:none;
             font-size:13px; text-shadow:0 1px 4px rgba(0,0,0,.85); }
  #controls button{ background:linear-gradient(180deg,#3a2f1e,#221a10); color:#ecdfc4;
             border:1px solid rgba(201,168,106,.6); border-radius:7px;
             padding:8px 14px; cursor:pointer; font-family:inherit; font-size:13px; letter-spacing:1px;
             box-shadow:0 2px 6px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,232,180,.12); }
  #controls button:hover{ background:linear-gradient(180deg,#4d3f28,#2e2415); border-color:rgba(232,200,122,.85); }
  #controls button.on{ background:linear-gradient(180deg,#f1d68c,#dcb45c); border-color:#f0d488; color:#1a1206;
             font-weight:700; box-shadow:0 2px 8px rgba(232,200,122,.45), inset 0 1px 0 rgba(255,255,255,.4); }
  #scrubwrap{ flex:1; position:relative; display:flex; align-items:center; }
  #scrub{ width:100%; accent-color:#ff6a5b; cursor:pointer; }
  #markers{ position:absolute; left:0; right:0; top:0; bottom:0; pointer-events:none; }
  .mk{ position:absolute; top:50%; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; }
  .mk-dot{ display:block; width:7px; height:7px; background:#e8c87a; border:1px solid #14161c;
           transform:rotate(45deg); box-shadow:0 0 3px rgba(0,0,0,.6); }
  .mk.hot .mk-dot{ background:#ffd24a; }
  .mk.conj .mk-dot{ background:#6f7682; border-color:#2a2f38; opacity:.7; }   /* 史料較弱/軍記:暗灰菱點 */
  .mk.conj .mk-lbl::after{ content:" ※軍記/演繹"; opacity:.6; font-size:10px; }
  .mk-lbl{ position:absolute; bottom:15px; left:50%; transform:translateX(-50%); white-space:nowrap;
           font-size:11px; color:#f0ead2; background:rgba(10,12,16,.92); border:1px solid rgba(201,168,106,.42);
           padding:2px 8px; border-radius:5px; opacity:0; transition:opacity .15s; pointer-events:none;
           letter-spacing:1px; }
  .mk:hover .mk-lbl{ opacity:1; }
  .mk:hover .mk-dot{ background:#ffe6a8; transform:rotate(45deg) scale(1.35); }
  #tlabel{ min-width:108px; font-weight:700; letter-spacing:2px; }
  #spd{ background:rgba(28,22,15,.92); color:var(--ink); border:1px solid rgba(201,168,106,.34); border-radius:7px; padding:7px;
        font-family:inherit; }

  /* 部隊卡片 */
  #card{ position:fixed; left:50%; top:50%; transform:translate(-50%,-46%) scale(.96);
         min-width:260px; background:rgba(26,20,13,.96); border:1px solid rgba(201,168,106,.42); border-radius:12px;
         padding:18px 20px; box-shadow:0 12px 40px rgba(0,0,0,.6); opacity:0; pointer-events:none;
         transition:opacity .2s, transform .2s; z-index:6; }
  #card.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  #card .card-name{ font-size:21px; font-weight:700; margin-bottom:8px; }
  #card .card-name .ja{ font-size:12px; opacity:.7; font-weight:400; }
  #card .card-row{ font-size:13px; opacity:.9; margin:4px 0; letter-spacing:1px; }
  #card .card-row b{ font-size:15px; }
  #cardClose{ position:absolute; top:10px; right:12px; cursor:pointer; opacity:.6; }

  /* 手機 / 窄螢幕響應式（橫向觀看體驗最佳） */
  @media (max-width: 760px){
    #hud{ font-size:10px; top:8px; left:10px; padding:5px 9px 6px; }
    #campaign-switch{ top:52px; left:10px; font-size:10px; }
    #campaign-switch .cs-item{ padding:4px 9px; }
    #bars{ width:132px; font-size:10px; top:8px; right:8px; }
    #legend{ width:148px; font-size:9px; line-height:1.4; top:58px; right:8px; padding:7px 8px; }
    #legend .lg-hr{ margin:5px 0; }
    #caption{ bottom:88px; width:93vw; }
    #evDate{ font-size:11px; letter-spacing:2px; }
    #evTitle{ font-size:19px; letter-spacing:1px; }
    #evTitleEn{ font-size:10px; }
    #evNarr{ font-size:12px; line-height:1.55; margin-top:7px; }
    #evCmd{ margin-top:7px; }
    #controls{ gap:5px; padding:0 8px; height:60px; }
    #controls button{ padding:6px 7px; font-size:11px; }
    #spd{ padding:5px; font-size:11px; }
    #tlabel{ min-width:auto; font-size:11px; letter-spacing:1px; }
    #titlecard h1{ font-size:22px; letter-spacing:4px; }
    #notes{ padding:18px 16px; }
    #notes h2{ font-size:15px; }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="labels"></div>

  <div id="titlecard">
    <h1>關 原 之 戰</h1>
    <p>慶長五年九月十五日 · 1600 — <span style="color:var(--east)">東軍</span> 對 <span style="color:var(--west)">西軍</span></p>
  </div>

  <div id="hud">
    <div class="clk"><b id="clock">辰刻 08:00</b> <span id="phase" style="opacity:.85"></span></div>
    <div class="hint">拖曳 = 運鏡　·　滾輪 = 縮放　·　右鍵 = 平移</div>
  </div>

  <!-- 戰役切換 -->
  <nav id="campaign-switch" aria-label="切換戰役">
    <span class="cs-item active">關原之戰<small>1600</small></span>
    <a class="cs-item" href="okehazama.html">桶狹間之戰<small>1560</small></a>
  </nav>

  <!-- 符號圖例（常駐右上） -->
  <div id="legend">
    <div class="lg-title">圖 例</div>

    <div class="lg-sec">陣　營</div>
    <div class="lg-row"><span class="sw" style="background:var(--east)"></span>東軍（德川）</div>
    <div class="lg-row"><span class="sw" style="background:var(--west)"></span>西軍（石田）</div>

    <div class="lg-sec">圖　示</div>
    <div class="lg-row"><span class="ic">⚑</span>武將本陣（軍旗・家紋）</div>
    <div class="lg-row"><span class="ic">➤</span>行軍・進攻方向</div>
    <div class="lg-row"><span class="ic">▲</span>山<span class="ic">🏯</span>城<span class="ic">⚔</span>古戰場</div>
    <div class="lg-row"><span class="ic">🔥</span>鉄砲齊射・砲擊<span class="ic">⛓</span>潰滅</div>

    <div class="lg-sec">兵　種</div>
    <div class="lg-row"><span class="kbadge k-command">本</span>本陣・旗本</div>
    <div class="lg-row"><span class="kbadge k-cavalry">騎</span>騎馬隊</div>
    <div class="lg-row"><span class="kbadge k-matchlock">銃</span>鉄砲（火縄銃）</div>
    <div class="lg-row"><span class="kbadge k-artillery">砲</span>大筒</div>
    <div class="lg-row"><span class="kbadge k-infantry">槍</span>足軽・長槍</div>
  </div>

  <!-- 軍隊清單面板（右側） -->
  <div id="roster"></div>

  <!-- 史料面板（按鈕開啟） -->
  <div id="notes">
    <span id="notesClose">✕</span>
    <h2>史料說明 · Notes &amp; Sources</h2>
    <div id="notesBody"></div>
  </div>

  <!-- 抗衡戰力條（頂部中央，藍紅拉鋸） -->
  <div id="bars">
    <div class="bal-head">
      <span class="side-east">⚔ 德川家康 <b id="valEast">0</b></span>

      <input type="range" id="scrub" min="0" max="1000" step="1" value="0">
      <div id="markers"></div>
    </span>
    <select id="spd">
      <option value="0.07">0.2×</option>
      <option value="0.175">0.5×</option>
      <option value="0.35" selected>1×</option>
      <option value="0.7">2×</option>
    </select>
    <button id="btnMode" class="on">🎬 節目模式</button>
    <button id="btnRoster">📋 軍隊</button>
    <button id="btnNotes">📜 史料</button>
  </div>
