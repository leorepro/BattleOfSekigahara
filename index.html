<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3D 關原之戰 — 電視級歷史節目</title>
<style>
  :root{
    --east:#3a78ff;   /* 東軍 德川 藍 */
    --west:#ff3b3b;   /* 西軍 石田 紅 */
    --ink:#e9e4d4;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a0d12; }
  body{ font-family:"Noto Serif TC","Songti TC",serif; color:var(--ink); }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; }

  /* CSS2D 標籤層 */
  #labels{ position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .lbl{ font-size:13px; white-space:nowrap; text-shadow:0 1px 3px #000,0 0 6px #000;
        transform:translate(-50%,-50%); }
  .lbl-geo{ color:#e4ead8; letter-spacing:1px; }
  .lbl-geo .ja{ font-size:9px; opacity:.55; }
  .lbl-geo .ic{ margin-right:3px; opacity:.85; }
  .geo-major{ font-size:14px; font-weight:600; color:#f0ead2; }
  .geo-major .ic{ color:#e8c87a; }
  .geo-minor{ font-size:11px; opacity:.7; }
  .lbl-unit{ font-weight:700; text-align:center; line-height:1.3; }
  .lbl-unit .ja{ font-size:10px; opacity:.75; font-weight:400; }
  .lbl-unit .troops{ font-size:11px; font-weight:400; opacity:.9; }
  .lbl-unit.focus{ font-size:15px; text-shadow:0 1px 4px #000,0 0 8px rgba(255,220,140,.5); }
  .lbl-unit.dim{ font-size:10px; }
  .lbl-unit.dim .troops{ display:none; }
  .side-east{ color:#9cc0ff; } .side-west{ color:#ff9c9c; }

  /* 標題卡 */
  #titlecard{ position:fixed; left:0; right:0; bottom:8%; text-align:center;
              pointer-events:none; transition:opacity .6s; }
  #titlecard h1{ font-size:30px; letter-spacing:6px; text-shadow:0 2px 12px #000; }
  #titlecard p{ margin-top:6px; font-size:14px; opacity:.8; letter-spacing:2px; }

  /* HUD：載入/操作提示 */
  #hud{ position:fixed; top:14px; left:16px; font-size:12px; opacity:.7; line-height:1.6;
        letter-spacing:1px; }
  #hud b{ color:#fff; }
  #loading{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
            background:#0a0d12; z-index:10; transition:opacity .8s; font-size:15px; letter-spacing:3px; }

  /* 事件卡（旁白） */
  #caption{ position:fixed; left:50%; transform:translateX(-50%); bottom:104px; width:min(820px,86vw);
            text-align:center; pointer-events:none; transition:opacity .5s; }
  #evDate{ font-size:13px; letter-spacing:4px; color:#e8c87a; text-shadow:0 1px 6px #000; }
  #evTitle{ font-size:27px; font-weight:700; letter-spacing:3px; margin-top:4px;
            text-shadow:0 2px 12px #000,0 0 5px #000; }
  #evTitleEn{ font-size:13px; font-style:italic; opacity:.72; letter-spacing:2px; margin-top:2px;
              text-shadow:0 1px 6px #000; }
  #evNarr{ font-size:14px; line-height:1.7; margin-top:10px; opacity:.92; letter-spacing:.5px;
           text-shadow:0 1px 8px #000,0 0 3px #000; }
  #evCmd{ margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  #evCmd .chip{ font-size:12px; padding:3px 11px; border-radius:13px; background:rgba(20,24,30,.7);
                border:1px solid #3a4350; letter-spacing:1px; }
  #evCmd .chip .en{ opacity:.6; font-size:10px; }
  #caption.hot #evTitle{ color:#ffd24a; text-shadow:0 0 18px rgba(255,160,0,.85),0 2px 8px #000; }

  /* 符號圖例 */
  #legend{ position:fixed; top:70px; right:16px; width:210px; background:rgba(16,20,26,.72);
           border:1px solid #2c343f; border-radius:9px; padding:11px 13px; font-size:11.5px;
           line-height:1.5; letter-spacing:.5px; }
  #legend .lg-row{ display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend .sw{ width:13px; height:13px; border-radius:3px; display:inline-block; }
  #legend .ic{ display:inline-block; min-width:15px; text-align:center; }
  #legend .lg-hr{ height:1px; background:#2c343f; margin:7px 0; }

  /* 史料面板 */
  #notes{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(.97);
          width:min(720px,90vw); max-height:82vh; overflow-y:auto; background:rgba(17,21,27,.97);
          border:1px solid #3a4350; border-radius:13px; padding:24px 28px; z-index:8;
          opacity:0; pointer-events:none; transition:opacity .22s, transform .22s;
          box-shadow:0 16px 50px rgba(0,0,0,.6); }
  #notes.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  #notes h2{ font-size:18px; letter-spacing:3px; margin-bottom:14px; color:#f0ead2; }
  #notes h3{ font-size:14px; color:#e8c87a; margin:16px 0 7px; letter-spacing:2px; }
  #notes p{ font-size:13px; line-height:1.8; opacity:.92; }
  #notes ul{ margin:4px 0 4px 4px; list-style:none; }
  #notes li{ font-size:12.5px; line-height:1.7; opacity:.88; padding-left:14px; position:relative; }
  #notes li::before{ content:"·"; position:absolute; left:2px; color:#e8c87a; }
  #notes li.caveat::before{ content:"⚠"; font-size:10px; }
  #notesClose{ position:absolute; top:14px; right:18px; cursor:pointer; opacity:.6; font-size:15px; }

  /* 兵力儀表 */
  #bars{ position:fixed; top:14px; right:16px; width:210px; font-size:12px; letter-spacing:1px;
         text-shadow:0 1px 3px #000; }
  #bars .row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  #bars .name{ width:54px; text-align:right; }
  #bars .track{ flex:1; height:10px; background:rgba(255,255,255,.12); border-radius:5px; overflow:hidden; }
  #bars .fill{ height:100%; transition:width .25s; border-radius:5px; }
  #barEast{ background:linear-gradient(90deg,#1f4fd6,#5b93ff); }
  #barWest{ background:linear-gradient(90deg,#cc1f1f,#ff6a5b); }
  #bars .val{ width:46px; }

  /* 控制列 */
  #controls{ position:fixed; left:0; right:0; bottom:0; height:84px; display:flex; align-items:center;
             gap:14px; padding:0 20px; background:linear-gradient(0deg,rgba(8,10,14,.92),rgba(8,10,14,0));
             font-size:13px; }
  #controls button{ background:#1c222b; color:var(--ink); border:1px solid #333b47; border-radius:7px;
             padding:8px 12px; cursor:pointer; font-family:inherit; font-size:13px; letter-spacing:1px; }
  #controls button:hover{ background:#28303b; }
  #controls button.on{ border-color:#6f87ff; color:#cdd8ff; }
  #scrub{ flex:1; accent-color:#ff6a5b; cursor:pointer; }
  #tlabel{ min-width:108px; font-weight:700; letter-spacing:2px; }
  #spd{ background:#1c222b; color:var(--ink); border:1px solid #333b47; border-radius:7px; padding:7px;
        font-family:inherit; }

  /* 部隊卡片 */
  #card{ position:fixed; left:50%; top:50%; transform:translate(-50%,-46%) scale(.96);
         min-width:260px; background:rgba(20,24,30,.96); border:1px solid #3a4350; border-radius:12px;
         padding:18px 20px; box-shadow:0 12px 40px rgba(0,0,0,.6); opacity:0; pointer-events:none;
         transition:opacity .2s, transform .2s; z-index:6; }
  #card.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  #card .card-name{ font-size:21px; font-weight:700; margin-bottom:8px; }
  #card .card-name .ja{ font-size:12px; opacity:.7; font-weight:400; }
  #card .card-row{ font-size:13px; opacity:.9; margin:4px 0; letter-spacing:1px; }
  #card .card-row b{ font-size:15px; }
  #cardClose{ position:absolute; top:10px; right:12px; cursor:pointer; opacity:.6; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="labels"></div>

  <div id="titlecard">
    <h1>關 原 之 戰</h1>
    <p>慶長五年九月十五日 · 1600 — <span style="color:var(--east)">東軍</span> 對 <span style="color:var(--west)">西軍</span></p>
  </div>

  <div id="hud">
    <div><b id="clock">辰刻 08:00</b> <span id="phase" style="opacity:.85"></span></div>
    <div>拖曳 = 運鏡　·　滾輪 = 縮放　·　右鍵 = 平移</div>
  </div>

  <!-- 符號圖例（常駐右上） -->
  <div id="legend">
    <div class="lg-row"><span class="sw" style="background:var(--east)"></span>東軍（德川）</div>
    <div class="lg-row"><span class="sw" style="background:var(--west)"></span>西軍（石田）</div>
    <div class="lg-hr"></div>
    <div class="lg-row"><span class="ic">⚑</span>武將本陣（軍旗 · 家紋）</div>
    <div class="lg-row"><span class="ic">➤</span>行軍 / 進攻方向（緞帶）</div>
    <div class="lg-row"><span class="ic">▲</span>山 ·　<span class="ic">🏯</span>城 ·　<span class="ic">⚔</span>古戰場</div>
    <div class="lg-row"><span class="ic">🔥</span>鉄砲齊射 / 砲擊　<span class="ic">⛓</span>潰滅</div>
    <div class="lg-row" style="opacity:.7">兵種：鉄砲 · 騎馬 · 足軽 · 大筒</div>
  </div>

  <!-- 史料面板（按鈕開啟） -->
  <div id="notes">
    <span id="notesClose">✕</span>
    <h2>史料說明 · Notes &amp; Sources</h2>
    <div id="notesBody"></div>
  </div>

  <!-- 兵力儀表 -->
  <div id="bars">
    <div class="row"><span class="name side-east">東軍</span>
      <span class="track"><span class="fill" id="barEast"></span></span><span class="val" id="valEast">0</span></div>
    <div class="row"><span class="name side-west">西軍</span>
      <span class="track"><span class="fill" id="barWest"></span></span><span class="val" id="valWest">0</span></div>
  </div>

  <!-- 事件卡（旁白） -->
  <div id="caption">
    <div id="evDate"></div>
    <div id="evTitle"></div>
    <div id="evTitleEn"></div>
    <div id="evNarr"></div>
    <div id="evCmd"></div>
  </div>

  <!-- 部隊卡片 -->
  <div id="card"><span id="cardClose">✕</span><div id="cardBody"></div></div>

  <!-- 控制列 -->
  <div id="controls">
    <button id="btnPlay">⏸</button>
    <span id="tlabel">辰刻 08:00</span>
    <input type="range" id="scrub" min="8" max="14" step="0.01" value="8">
    <select id="spd">
      <option value="0.2">0.5×</option>
      <option value="0.35" selected>1×</option>
      <option value="0.7">2×</option>
      <option value="1.4">4×</option>
    </select>
    <button id="btnMode" class="on">🎬 節目模式</button>
    <button id="btnNotes">📜 史料</button>
    <button id="btnAudio">🔈 配樂</button>
  </div>

  <audio id="bgm" src="assets/audio/bgm.mp3" loop preload="none"></audio>

  <div id="loading">載入中…</div>

  <!-- 函式庫（全域 THREE，免 build） -->
  <script src="lib/three/three.min.js"></script>
  <script src="lib/three/OrbitControls.js"></script>
  <script src="lib/three/CSS2DRenderer.js"></script>

  <!-- 資料 -->
  <script src="data/geography.js"></script>
  <script src="data/heightmap.js"></script>
  <script src="data/armies.js"></script>
  <script src="data/weather.js"></script>
  <script src="data/storyboard.js"></script>
  <script src="data/sources.js"></script>

  <!-- 引擎（依序載入，掛到全域 SEKI 命名空間） -->
  <script src="src/engine/scene.js"></script>
  <script src="src/engine/terrain.js"></script>
  <script src="src/engine/labels.js"></script>
  <script src="src/engine/crest.js"></script>
  <script src="src/engine/units.js"></script>
  <script src="src/engine/routes.js"></script>
  <script src="src/engine/effects.js"></script>
  <script src="src/engine/weather.js"></script>
  <script src="src/engine/storyboard.js"></script>
  <script src="src/engine/ui.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
